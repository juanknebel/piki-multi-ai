name: Nightly

on:
  push:
    branches:
      - nightly

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: piki-multi-ai-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: piki-multi-ai-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: piki-multi-ai-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p agent-multi

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz piki-multi-ai
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: cd crates/desktop/frontend && npm install && npm run build

      - name: Generate platform icons
        run: npx @tauri-apps/cli icon crates/desktop/icons/icon.png --output crates/desktop/icons

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/desktop
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config '{"build":{"beforeBuildCommand":""}}'

      - name: Collect desktop bundles
        run: |
          mkdir -p desktop-bundles
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb desktop-bundles/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg desktop-bundles/ 2>/dev/null || true
          ls -la desktop-bundles/

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop-bundles/*

  release:
    needs: [build, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          gh release create nightly \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Automated nightly build from the \`nightly\` branch.

          **Commit:** ${{ github.sha }}
          **Built at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          > This is a pre-release. For stable versions, see the [latest release](../../releases/latest)." \
            --prerelease \
            *.tar.gz *.deb *.dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
