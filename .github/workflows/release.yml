name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: piki-multi-ai-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: piki-multi-ai-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: piki-multi-ai-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p agent-multi

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz piki-multi-ai
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: cd crates/desktop/frontend && npm install && npm run build

      - name: Generate platform icons
        run: npx @tauri-apps/cli icon crates/desktop/icons/icon.png --output crates/desktop/icons

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/desktop
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config '{"build":{"beforeBuildCommand":""}}'

      - name: Collect desktop bundles
        run: |
          mkdir -p desktop-bundles
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb desktop-bundles/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg desktop-bundles/ 2>/dev/null || true
          if [ -f target/${{ matrix.target }}/release/piki-desktop ]; then
            tar czf desktop-bundles/piki-desktop-linux-amd64.tar.gz -C target/${{ matrix.target }}/release piki-desktop
          fi
          ls -la desktop-bundles/

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop-bundles/*

  release:
    needs: [build, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Package Linux bundle
        run: |
          mkdir -p piki-linux-amd64
          tar xzf piki-multi-ai-linux-amd64.tar.gz -C piki-linux-amd64/
          tar xzf piki-desktop-linux-amd64.tar.gz -C piki-linux-amd64/
          cp packaging/linux/install.sh piki-linux-amd64/
          cp packaging/linux/README.md piki-linux-amd64/
          cp crates/desktop/icons/icon.png piki-linux-amd64/
          chmod +x piki-linux-amd64/install.sh
          tar czf piki-linux-amd64.tar.gz piki-linux-amd64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ### macOS
            The `.dmg` is not signed. After mounting and dragging to Applications, remove the quarantine attribute:
            ```
            xattr -cr /Applications/Piki\ Desktop.app
            ```
            Or right-click the app and select **Open** to bypass Gatekeeper.
          files: |
            *.tar.gz
            *.deb
            *.dmg
