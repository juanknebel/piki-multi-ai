<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piki Desktop</title>
    <link rel="stylesheet" href="/src/styles/reset.css" />
    <link rel="stylesheet" href="/src/styles/variables.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/activity-bar.css" />
    <link rel="stylesheet" href="/src/styles/sidebar.css" />
    <link rel="stylesheet" href="/src/styles/tab-bar.css" />
    <link rel="stylesheet" href="/src/styles/terminal.css" />
    <link rel="stylesheet" href="/src/styles/status-bar.css" />
    <link rel="stylesheet" href="/src/styles/dialog.css" />
    <link rel="stylesheet" href="/src/styles/markdown.css" />
    <link rel="stylesheet" href="/src/styles/source-control.css" />
    <link rel="stylesheet" href="/src/styles/command-palette.css" />
    <link rel="stylesheet" href="/src/styles/diff.css" />
    <link rel="stylesheet" href="/src/styles/dashboard.css" />
    <link rel="stylesheet" href="/src/styles/theme-dialog.css" />
    <link rel="stylesheet" href="/src/styles/menu-bar.css" />
    <link rel="stylesheet" href="/src/styles/kanban.css" />
    <link rel="stylesheet" href="/src/styles/api-panel.css" />
  </head>
  <body>
    <div id="app">
      <nav id="menu-bar"></nav>
      <aside id="activity-bar"></aside>
      <div id="sidebar">
        <div id="explorer-view" style="display:flex;flex-direction:column;height:100%">
          <section id="workspace-list"></section>
        </div>
        <div id="source-control-view" style="display:none"></div>
        <div id="agents-view" style="display:none;flex-direction:column;height:100%;overflow-y:auto;background:var(--sidebar-bg)"></div>
      </div>
      <div id="sidebar-resize-v"></div>
      <div id="editor-area">
        <nav id="tab-bar"></nav>
        <main id="main-content"></main>
      </div>
      <footer id="status-bar"></footer>
    </div>
    <div id="overlay-container"></div>
    <div id="toast-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
