# Catppuccin Latte — pastel LIGHT palette
# https://github.com/catppuccin/catppuccin
#
# A light theme: the ink ramp (bg*) is light and the text ramp (fg*) is dark.
# Every role and every direct palette read derives from these primitives, so a
# light `[palette]` is enough to retint the whole UI — no per-role overrides.

[palette]
bg0 = "#eff1f5"          # base — canvas
bg1 = "#e6e9ef"          # mantle — alt rows
bg2 = "#dce0e8"          # crust — group headers, inactive tabs, status bar
bg3 = "#ccd0da"          # surface0 — overlays / popups
line = "#bcc0cc"         # surface1 — unfocused borders
line_strong = "#acb0be"  # surface2 — dialog borders
fg0 = "#4c4f69"          # text — primary (dark on light)
fg1 = "#5c5f77"          # subtext1 — body text
fg2 = "#6c6f85"          # subtext0 — muted detail
fg3 = "#8c8fa1"          # overlay1 — ghost / placeholders
iris = "#8839ef"         # mauve — THE accent: focus, active tab, keys
iris_wash = "#d6ccf5"    # light lavender — selection background
ok = "#40a02b"           # green — done, staged, additions
warn = "#df8e1d"         # yellow — needs-you, modified
err = "#d20f39"          # red — errors, deletions
info = "#1e66f5"         # blue — running, info, renames
diff_add_bg = "#d7e8cf"
diff_del_bg = "#f2d3da"

# Diff line text needs to stay legible on the light tint backgrounds.
[diff]
add = "#2f7d1e"
del = "#b00c30"
