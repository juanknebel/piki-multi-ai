# Breeze — KDE Plasma's signature dark palette (Breeze Dark / KColorScheme)
# Signature accent: KDE blue #3daee9
#
# Cabina themes need only override the primitive `[palette]`; every role and
# every direct palette read derives from it. Add a `[section]` override below
# only to fine-tune a specific role.

[palette]
bg0 = "#232629"          # view background — canvas
bg1 = "#2a2e32"          # alt rows
bg2 = "#31363b"          # window background — headers, inactive tabs, bar
bg3 = "#3b4045"          # overlays / popups
line = "#4d4d4d"         # decoration inactive — unfocused borders
line_strong = "#5c6165"  # dialog borders
fg0 = "#fcfcfc"          # view foreground — primary text
fg1 = "#eff0f1"          # window foreground — body text
fg2 = "#a7b0b5"          # muted detail
fg3 = "#7f8c8d"          # text inactive — ghost / placeholders
iris = "#3daee9"         # KDE blue — THE accent: focus, active tab, keys
iris_wash = "#22485c"    # selection background in the focused pane
ok = "#27ae60"           # positive green — done, staged, additions
warn = "#f67400"         # neutral orange — needs-you, modified
err = "#da4453"          # negative red — errors, deletions
info = "#1d99f3"         # link blue — running, info, renames
diff_add_bg = "#243424"
diff_del_bg = "#342427"
