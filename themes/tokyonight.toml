# Tokyo Night — dark blue palette
# https://github.com/folke/tokyonight.nvim (Night variant)
#
# Cabina themes need only override the primitive `[palette]`; every role and
# every direct palette read derives from it. Add a `[section]` override below
# only to fine-tune a specific role.

[palette]
bg0 = "#1a1b26"          # canvas
bg1 = "#1f2335"          # alt rows
bg2 = "#24283b"          # raised: group headers, inactive tabs, status bar
bg3 = "#292e42"          # overlays / popups
line = "#3b4261"         # unfocused borders
line_strong = "#545c7e"  # dialog borders
fg0 = "#c0caf5"          # primary text
fg1 = "#a9b1d6"          # body text
fg2 = "#828bb8"          # muted detail
fg3 = "#565f89"          # ghost / placeholders
iris = "#7aa2f7"         # THE accent (blue): focus, active tab, keys, matches
iris_wash = "#283457"    # selection background in the focused pane
ok = "#9ece6a"           # done, staged, additions, success
warn = "#e0af68"         # needs-you, modified
err = "#f7768e"          # errors, deletions, destructive confirms
info = "#7dcfff"         # running, info toasts, renames
diff_add_bg = "#1f2b22"
diff_del_bg = "#2d2028"
