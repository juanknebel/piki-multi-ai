# Solarized Light — warm LIGHT palette
# https://ethanschoonover.com/solarized/
#
# A light theme: the ink ramp (bg*) is light and the text ramp (fg*) is dark.
# Every role and every direct palette read derives from these primitives, so a
# light `[palette]` is enough to retint the whole UI — no per-role overrides.

[palette]
bg0 = "#fdf6e3"          # base3 — canvas
bg1 = "#f2ecd8"          # alt rows
bg2 = "#eee8d5"          # base2 — group headers, inactive tabs, status bar
bg3 = "#e3ddc9"          # overlays / popups
line = "#c8c2ad"         # unfocused borders
line_strong = "#93a1a1"  # base1 — dialog borders
fg0 = "#073642"          # base02 — primary (dark on light)
fg1 = "#586e75"          # base01 — body text
fg2 = "#657b83"          # base00 — muted detail
fg3 = "#93a1a1"          # base1 — ghost / placeholders
iris = "#6c71c4"         # violet — THE accent: focus, active tab, keys
iris_wash = "#dcd6ef"    # light violet — selection background
ok = "#859900"           # green — done, staged, additions
warn = "#b58900"         # yellow — needs-you, modified
err = "#dc322f"          # red — errors, deletions
info = "#268bd2"         # blue — running, info, renames
diff_add_bg = "#e4ecc9"
diff_del_bg = "#f5d9d3"

# Diff line text needs to stay legible on the light tint backgrounds.
[diff]
add = "#5b6800"
del = "#c22320"
