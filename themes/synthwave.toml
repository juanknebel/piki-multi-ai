# Synthwave — neon retro-futuristic palette (synthwave '84)
#
# Cabina themes need only override the primitive `[palette]`; every role and
# every direct palette read derives from it. Add a `[section]` override below
# only to fine-tune a specific role.

[palette]
bg0 = "#241b2f"          # deep purple canvas
bg1 = "#2a2040"          # alt rows
bg2 = "#34294f"          # raised: group headers, inactive tabs, status bar
bg3 = "#3d3060"          # overlays / popups
line = "#495495"         # unfocused borders (muted indigo)
line_strong = "#6d5f9c"  # dialog borders
fg0 = "#ffffff"          # primary text
fg1 = "#e6e1f2"          # body text
fg2 = "#b3aacc"          # muted detail
fg3 = "#7d739e"          # ghost / placeholders
iris = "#ff7edb"         # THE accent (hot pink): focus, active tab, keys
iris_wash = "#463465"    # selection background in the focused pane
ok = "#72f1b8"           # neon green — done, staged, additions
warn = "#fede5d"         # neon yellow — needs-you, modified
err = "#fe4450"          # neon red — errors, deletions
info = "#36f9f6"         # neon cyan — running, info, renames
diff_add_bg = "#20342a"
diff_del_bg = "#3a2028"
