# Synthwave theme — neon retro-futuristic palette

[border]
active_interact = "#ff7edb"   # hot pink
active_navigate = "#fede5d"   # neon yellow
inactive = "#495495"          # muted indigo

[workspace_list]
empty_text = "#495495"
name_active = "#ffffff"
name_inactive = "#bbbbbb"
detail_selected = "#bbbbbb"
detail_normal = "#495495"
selected_bg = "#34294f"
group_header_bg = "#2a2040"
separator = "#3d3060"
alt_bg = "#241c3a"

[file_list]
empty_text = "#495495"
modified = "#fede5d"          # neon yellow
added = "#72f1b8"             # neon green
deleted = "#fe4450"           # neon red
renamed = "#36f9f6"           # neon cyan
untracked = "#495495"
conflicted = "#ff7edb"        # hot pink
staged = "#72f1b8"
staged_modified = "#fede5d"
file_path = "#ffffff"
selected_bg = "#34294f"

[tabs]
