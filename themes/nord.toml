# Nord theme — dark, muted Arctic palette
# Based on https://www.nordtheme.com/

[border]
active_interact = "#a3be8c"   # nord14 green
active_navigate = "#ebcb8b"   # nord13 yellow
inactive = "#4c566a"          # nord3

[workspace_list]
empty_text = "#4c566a"
name_active = "#eceff4"       # nord6
name_inactive = "#d8dee9"     # nord4
detail_selected = "#d8dee9"
detail_normal = "#4c566a"
selected_bg = "#3b4252"       # nord1
group_header_bg = "#3b4252"   # nord1
separator = "#434c5e"         # nord2
alt_bg = "#353b49"

[file_list]
empty_text = "#4c566a"
modified = "#ebcb8b"          # nord13
added = "#a3be8c"             # nord14
deleted = "#bf616a"           # nord11
renamed = "#88c0d0"           # nord8
untracked = "#4c566a"
conflicted = "#b48ead"        # nord15
staged = "#a3be8c"
staged_modified = "#ebcb8b"
file_path = "#eceff4"
selected_bg = "#3b4252"

[tabs]
