inactive = "#4c566a"

[status_bar]
error_bg = "#bf616a"
error_fg = "#eceff4"
diff_bg = "#3b4252"
diff_fg = "#eceff4"
interact_bg = "#a3be8c"
navigate_bg = "#ebcb8b"
mode_fg = "#2e3440"           # nord0

[footer]
key = "#ebcb8b"
description = "#d8dee9"

[diff]
border = "#88c0d0"
empty_text = "#4c566a"

[dialog]
new_ws_border = "#ebcb8b"
new_ws_active = "#ebcb8b"
new_ws_inactive = "#4c566a"
delete_border = "#bf616a"
delete_text = "#eceff4"
delete_name = "#ebcb8b"
delete_yes = "#bf616a"
delete_no = "#a3be8c"
delete_cancel = "#4c566a"

[help]
border = "#88c0d0"

[general]
welcome_text = "#d8dee9"
muted_text = "#4c566a"
