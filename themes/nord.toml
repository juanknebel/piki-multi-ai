# Nord — dark, muted Arctic palette
# https://www.nordtheme.com/
#
# Cabina themes need only override the primitive `[palette]`; every role and
# every direct palette read derives from it. Add a `[section]` override below
# only to fine-tune a specific role.

[palette]
bg0 = "#2e3440"          # nord0 — canvas
bg1 = "#353b49"          # alt rows
bg2 = "#3b4252"          # nord1 — group headers, inactive tabs, status bar
bg3 = "#434c5e"          # nord2 — overlays / popups
line = "#4c566a"         # nord3 — unfocused borders
line_strong = "#616e88"  # dialog borders
fg0 = "#eceff4"          # nord6 — primary text
fg1 = "#d8dee9"          # nord4 — body text
fg2 = "#9aa4bc"          # muted detail
fg3 = "#707d96"          # ghost / placeholders
iris = "#88c0d0"         # nord8 — THE accent: focus, active tab, keys, matches
iris_wash = "#3b4a58"    # selection background in the focused pane
ok = "#a3be8c"           # nord14 — done, staged, additions
warn = "#ebcb8b"         # nord13 — needs-you, modified
err = "#bf616a"          # nord11 — errors, deletions
info = "#81a1c1"         # nord9 — running, info, renames
diff_add_bg = "#2f3a2f"
diff_del_bg = "#362a2c"
